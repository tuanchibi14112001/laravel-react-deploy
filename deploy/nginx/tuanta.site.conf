# /etc/nginx/sites-available/tuanta.site
#
# Frontend (React build tĩnh) phục vụ ở "/"
# Backend (Laravel API) phục vụ ở "/api" qua PHP-FPM
# => Chung 1 domain tuanta.site, không còn CORS.

# Chuyển HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tuanta.site www.tuanta.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tuanta.site www.tuanta.site;

    # SSL (certbot sẽ tự điền sau khi chạy `certbot --nginx`)
    ssl_certificate     /etc/letsencrypt/live/tuanta.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuanta.site/privkey.pem;

    # Cho phép upload tối đa 20MB (tùy chỉnh nếu cần)
    client_max_body_size 20M;

    # ---------- Frontend: React SPA (file tĩnh) ----------
    root /var/www/tuanta/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache asset tĩnh có hash (js/css/ảnh)
    location /assets/ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ---------- Backend: Laravel API ----------
    location /api {
        try_files $uri $uri/ @laravel;
    }

    location @laravel {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;       # đổi đúng phiên bản PHP-FPM
        fastcgi_param SCRIPT_FILENAME /var/www/tuanta/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param PATH_INFO $request_uri;
    }

    # Chặn truy cập file ẩn (.env, .git, ...)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
